name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      tag_name:
        # The tag must already exist; the binaries are built from it.
        description: "Tag name for the release (must already exist)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  TAG_NAME: ${{ inputs.tag_name || github.ref_name }}

concurrency:
  group: release-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        run: gh release view "$TAG_NAME" || gh release create "$TAG_NAME" --draft --generate-notes

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pk2_mate
          package: pk2_mate
          target: ${{ matrix.target }}
          build-tool: ${{ contains(matrix.target, 'aarch64-unknown-linux') && 'cross' || 'cargo' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/tags/${{ env.TAG_NAME }}

